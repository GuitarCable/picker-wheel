# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/picker_wheel.png"
  web:
    generate: false
    image_path: "assets/icon/picker_wheel.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "assets/icon/picker_wheel.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/icon/picker_wheel.png"
